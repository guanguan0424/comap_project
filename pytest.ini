[pytest]
testpaths = tests modules/core modules/auth modules/purchasing
pythonpath = . core modules
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认执行选项
addopts = 
    -v 
    --tb=short
    --strict-markers
    --strict-config
    -ra

# 测试标记定义
markers =
    api: API tests
    ui: UI tests
    smoke: Smoke tests - quick verification of core functionality
    regression: Regression tests - comprehensive feature coverage
    integration: Integration tests - end-to-end workflows
    performance: Performance tests - response time and load testing
    security: Security tests - authentication and authorization
    user_management: User management related tests
    login: Login workflow tests
    navigation: Navigation related tests
    logout: Logout workflow tests
    responsive: Responsive design tests
    user_permissions: User permissions related tests

# 测试配置
xfail_strict = true
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 覆盖率配置（可选安装pytest-cov后使用）
# cov_report =
#     term
#     html:reports/coverage.html
#     xml:reports/coverage.xml

